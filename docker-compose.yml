version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pearls-aqi-api
    ports:
      - "8000:8000"
    environment:
      - AQICN_API_KEY=${AQICN_API_KEY:-demo}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - HOPSWORKS_API_KEY=${HOPSWORKS_API_KEY:-}
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped


