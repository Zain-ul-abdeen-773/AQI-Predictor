name: Training Pipeline (Daily)

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}

jobs:
  validate-infrastructure:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Infrastructure Validation
        run: |
          python -m infrastructure.validation_agents.validate \
            --terraform-dir infrastructure/terraform
        id: validate

      - name: Check Validation Result
        if: failure()
        run: |
          echo "❌ Infrastructure validation FAILED — blocking training pipeline"
          exit 1

  train-models:
    name: Train & Evaluate Models
    runs-on: ubuntu-latest
    needs: validate-infrastructure
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Data Drift
        run: |
          python -c "
          from training_pipeline.evaluation import DataDriftDetector
          import numpy as np
          
          detector = DataDriftDetector(threshold=0.2)
          print('Data drift detection module loaded successfully')
          # Full drift check runs inside the training pipeline
          "

      - name: Extract Training Data
        run: |
          python -c "
          from feature_pipeline.register import FeatureStoreManager
          manager = FeatureStoreManager()
          df = manager.get_training_data()
          print(f'Retrieved {len(df)} training samples')
          df.to_csv('data/training_data.csv', index=False)
          "

      - name: Run Training Pipeline
        run: |
          python -m training_pipeline.train --csv data/training_data.csv
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          OPTUNA_N_TRIALS: 20

      - name: Compare with Champion
        run: |
          python -c "
          import json
          from pathlib import Path
          
          report = Path('models/training_report.json')
          if report.exists():
              data = json.loads(report.read_text())
              champion = data.get('champion', 'unknown')
              metrics = data.get('metrics', {})
              
              print(f'Champion: {champion}')
              for name, m in metrics.items():
                  print(f'  {name}: RMSE={m.get(\"rmse\", \"N/A\")}, R²={m.get(\"r2\", \"N/A\")}')
          else:
              print('No training report found')
          "

      - name: Upload Training Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-report
          path: |
            models/training_report.json
            models/sargodha_aqi_forecast_model/
          retention-days: 30

      - name: Run Model Tests
        run: |
          python -m pytest tests/test_training_pipeline.py -v --tb=short
        continue-on-error: true

      - name: Report Status
        if: always()
        run: |
          echo "Training pipeline completed at $(date -u)"
          echo "Status: ${{ job.status }}"
