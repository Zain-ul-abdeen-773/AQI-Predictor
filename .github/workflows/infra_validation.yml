name: Infrastructure Validation (LangGraph Gatekeeper)

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'requirements.txt'
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  validate-infra:
    name: LangGraph Multi-Agent Infrastructure Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LangGraph Infrastructure Validation Gatekeeper
        run: |
          python -m infrastructure.validation_agents.validate --terraform-dir infrastructure/terraform

      - name: Upload Validation Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-validation-report
          path: infrastructure/terraform/validation_report.json
          retention-days: 14
