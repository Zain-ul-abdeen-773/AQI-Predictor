name: Feature Pipeline (Hourly)

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SAGEMAKER_ROLE_ARN: ${{ secrets.SAGEMAKER_ROLE_ARN }}
  S3_FEATURE_STORE_BUCKET: ${{ secrets.S3_FEATURE_STORE_BUCKET }}
  AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

jobs:
  feature-pipeline:
    name: Execute Feature Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Feature Ingestion
        run: |
          python -m data_pipeline.ingest
        env:
          AQICN_API_KEY: ${{ secrets.AQICN_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}

      - name: Push to Feature Store
        run: |
          python -c "
          from feature_pipeline.register import FeatureStoreManager
          from data_pipeline.ingest import DataIngestionOrchestrator
          from data_pipeline.transformers import FeatureEngineer
          import asyncio

          async def run():
              orchestrator = DataIngestionOrchestrator()
              payload = await orchestrator.fetch_current()
              await orchestrator.close()
              
              engineer = FeatureEngineer()
              fv = engineer.transform(payload)
              
              import pandas as pd
              df = pd.DataFrame([fv.to_flat_dict()])
              
              manager = FeatureStoreManager()
              manager.create_feature_group()
              manager.insert_features(df)
              print(f'Pushed {len(df)} rows to feature store')

          asyncio.run(run())
          "

      - name: Run Unit Tests
        run: |
          python -m pytest tests/test_data_pipeline.py -v --tb=short
        continue-on-error: true

      - name: Report Status
        if: always()
        run: |
          echo "Feature pipeline completed at $(date -u)"
          echo "Status: ${{ job.status }}"
