services:
  - type: web
    name: pearls-aqi-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn deployment.api.main:app --bind 0.0.0.0:8000 --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: AQICN_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CLEARML_API_ACCESS_KEY
        sync: false
      - key: CLEARML_API_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
